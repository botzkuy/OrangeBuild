name: OrangeFox - Oppo A5s (GitLab Token Build)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Branch'
        required: true
        default: '9.0'
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/ZG089/android_device_OPPO_CPH1909'
      DEVICE_NAME:
        description: 'Codename'
        required: true
        default: 'CPH1909'

jobs:
  build:
    name: Build OFRP for CPH1909
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Pembersihan & Persiapan Debug
      uses: rokibhasansagar/slimhub_actions@main

    - name: Pasang Arsitektur i386 & Swap
      run: |
        sudo dpkg --add-architecture i386
        sudo apt update

    - name: "Operasi Transplantasi: Pasang Legacy Tools (Python 2 & SSL 1.1)"
      run: |
        # Menambahkan repo Focal untuk Python 2
        echo "deb http://dk.archive.ubuntu.com/ubuntu/ focal main universe" | sudo tee -a /etc/apt/sources.list
        sudo apt update
        
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev \
        gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
        libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
        libncurses5-dev rsync python2 python3 libncurses5
        
        # Download manual libssl1.1 (Wajib untuk signing Android 8.1/9.0)
        wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
        sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
        
        sudo ln -sf /usr/bin/python2 /usr/bin/python

    - name: Sync Source via GitLab (With Token)
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        mkdir -p ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        cd ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        
        # Install repo tool
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
        
        # INIT MENGGUNAKAN TOKEN GITLAB
        # Format: https://oauth2:TOKEN@gitlab.com/...
        repo init --no-repo-verify \
          -u https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/OrangeFox/manifest.git \
          -b fox_${{ github.event.inputs.MANIFEST_BRANCH }} --depth=1
        
        # Jalankan Sync
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        # Clone device tree ke path yang benar
        git clone ${{ github.event.inputs.DEVICE_TREE }} -b main ./device/oppo/${{ github.event.inputs.DEVICE_NAME }}

    - name: Build Recovery (CPH1909)
      run: |
        cd ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        
        # Verifikasi dapur
        if [ ! -f "build/envsetup.sh" ]; then
          echo "❌ Dapur kosong! Sinkronisasi gagal."
          exit 1
        fi
        
        # Proses masak
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"
        source build/envsetup.sh
        
        lunch omni_${{ github.event.inputs.DEVICE_NAME }}-eng
        make clean
        mka recoveryimage

    - name: Upload Hasil Build
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: |
          ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.img
          ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.zip
        name: OrangeFox-Unofficial-${{ github.event.inputs.DEVICE_NAME }}
        tag_name: build-${{ github.run_id }}
        body: |
          Build Sukses untuk Oppo A5s (Android 8.1/9.0 basis)
          Dibuat menggunakan Ubuntu 22.04 dengan GitLab Token.
