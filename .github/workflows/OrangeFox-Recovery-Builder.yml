name: OrangeFox - Oppo A5s Android 8.1 Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Branch (Gunakan 9.0 untuk Android 8.1)'
        required: true
        default: '9.0'
        type: choice
        options:
          - '9.0'
          - '11.0'
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/ZG089/android_device_OPPO_CPH1909'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Specify your device path.'
        required: true
        default: 'device/oppo/CPH1909'
      DEVICE_NAME:
        description: 'Specify your Device Codename.'
        required: true
        default: 'CPH1909'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'

jobs:
  build:
    name: Build OFRP Android 8.1
    runs-on: ubuntu-20.04 # WAJIB 20.04 untuk Android 8.1/9.0
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Cleanup Environment
      uses: rokibhasansagar/slimhub_actions@main

    - name: Set up Swap Space (24GB)
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: Install Legacy Build Dependencies
      run: |
        sudo apt update
        # Pustaka khusus untuk kompiler Android lama
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev \
        gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
        libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
        libncurses5-dev rsync python2 python3 libssl-dev
        
        # Setup Python 2 sebagai default (dibutuhkan Android 8.1)
        sudo ln -sf /usr/bin/python2 /usr/bin/python
        
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
      
    - name: Sync OrangeFox Manifest
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}

    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
        cd ${{ github.event.inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Build OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        # Set environment build
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"
        
        # Gunakan target lunch sesuai device tree
        lunch omni_${{ github.event.inputs.DEVICE_NAME }}-eng
        
        make clean
        mka ${{ github.event.inputs.BUILD_TARGET }}image

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: |
          ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.img
          ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.zip
        name: OrangeFox Android 8.1 for ${{ github.event.inputs.DEVICE_NAME }}
        tag_name: build-${{ github.run_id }}
        body: |
          Sukses membangun OrangeFox untuk Oppo A5s berbasis Android 8.1/9.0.
          Branch Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
