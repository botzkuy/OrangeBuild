name: OrangeFox - Oppo A5s (22.04 Forced Debug)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Branch'
        required: true
        default: '9.0'
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/ZG089/android_device_OPPO_CPH1909'
      DEVICE_NAME:
        description: 'Codename'
        required: true
        default: 'CPH1909'

jobs:
  build:
    name: Build OFRP on 22.04
    runs-on: ubuntu-22.04 # <--- Paksa pakai 22.04
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Pembersihan & Persiapan Debug
      uses: rokibhasansagar/slimhub_actions@main

    - name: Pasang Arsitektur i386 & Swap
      run: |
        sudo dpkg --add-architecture i386
        sudo apt update

    - name: "Operasi Transplantasi: Pasang Legacy Tools (Python 2 & SSL 1.1)"
      run: |
        # 1. Tambahkan repo Focal (20.04) HANYA untuk Python 2
        echo "deb http://dk.archive.ubuntu.com/ubuntu/ focal main universe" | sudo tee -a /etc/apt/sources.list
        sudo apt update
        
        # 2. Pasang dependencies (Termasuk Python 2 dan libncurses5)
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev \
        gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
        libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
        libncurses5-dev rsync python2 python3 libncurses5
        
        # 3. Download manual libssl1.1 (Karena di 22.04 sudah tidak ada)
        wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
        sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
        
        # 4. Link Python 2 agar terbaca sebagai 'python'
        sudo ln -sf /usr/bin/python2 /usr/bin/python

    - name: Setup Build Environment OrangeFox
      run: |
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
      
    - name: Hard-Sync Source (Tanpa Skrip Pembungkus)
      run: |
        # Buat folder kerja
        mkdir -p ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        cd ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        
        # Pastikan Git mengenal kita
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # Download tool 'repo' manual (versi terbaru)
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
        
        # INIT & SYNC (Kita tembak langsung ke Manifest)
        # Tambahkan --no-repo-verify untuk menghindari error Python di 22.04
        repo init --no-repo-verify -u https://gitlab.com/OrangeFox/manifest.git -b fox_9.0 --depth=1
        
        # Jalankan Sync dengan log yang terlihat (Force agar tidak gantung)
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        
        # DEBUG: Cek apakah folder 'build' sudah muncul
        ls -la build/envsetup.sh || echo "❌ FILE TETAP TIDAK ADA!"

    - name: Build Recovery (With Absolute Path)
      run: |
        cd ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        
        # Tambahkan pengaman: Jika file tidak ada, jangan lanjut
        if [ ! -f "build/envsetup.sh" ]; then
          echo "Dapur kosong! Tidak ada yang bisa dimasak."
          ls -R .repo/manifests # Cek apakah manifest-nya saja yang terdownload
          exit 1
        fi
        
        # Mulai kompilasi
        set -e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"
        
        lunch omni_CPH1909-eng
        make clean
        mka recoveryimage
    - name: Build Recovery
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"
        lunch omni_${{ github.event.inputs.DEVICE_NAME }}-eng
        make clean
        mka recoveryimage

    - name: Upload Hasil Build
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: |
          ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.img
          ${{ github.workspace }}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox*.zip
        name: OFRP-Unofficial-CPH1909-22.04
        tag_name: build-${{ github.run_id }}
